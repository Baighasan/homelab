- name: Validate required security variables
  ansible.builtin.assert:
    that:
      - security_admin_user | length > 0
      - security_ssh_public_keys | length > 0
    fail_msg: "Set admin_user and ssh_public_keys before running security role."
  tags: [security]

- name: Install security packages
  ansible.builtin.apt:
    name:
      - openssh-server
      - ufw
      - fail2ban
      - unattended-upgrades
    state: present
    update_cache: true
  tags: [security]

- name: Ensure authorized keys for admin user
  ansible.builtin.authorized_key:
    user: "{{ security_admin_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ security_ssh_public_keys }}"
  tags: [security]

- name: Deploy SSH baseline drop-in
  ansible.builtin.template:
    src: 50-ansible-ssh-baseline.conf.j2
    dest: /etc/ssh/sshd_config.d/50-ansible-ssh-baseline.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/sshd -t"
  notify: Reload ssh
  tags: [security]

- name: Enable unattended upgrades periodic updates
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  when: security_unattended_upgrades_enabled
  tags: [security]

- name: Allow OpenSSH in UFW
  community.general.ufw:
    rule: allow
    name: OpenSSH
  when: security_ufw_enabled
  tags: [security]

- name: Allow traffic on tailscale0
  community.general.ufw:
    rule: allow
    interface: tailscale0
    direction: in
  when: security_ufw_enabled
  tags: [security]

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  when: security_ufw_enabled
  tags: [security]

- name: Deploy fail2ban ssh jail
  ansible.builtin.template:
    src: jail-sshd.local.j2
    dest: /etc/fail2ban/jail.d/sshd.local
    owner: root
    group: root
    mode: "0644"
  when: security_fail2ban_enabled
  notify: Restart fail2ban
  tags: [security]

- name: Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  when: security_fail2ban_enabled
  tags: [security]
